<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backgroundcolor changer</title>
</head>
<body style="background-color: black; height: 100vh;  margin:0; display:flex; justify-content: center; align-items:center;">

    <div id="root" style="display: flex; flex-direction: row; align-items:center; ">
        <button id="red" style="height: 100px; width: 100px; background-color: red;">Red</button>
        <button id="blue" style="height: 100px; width: 100px; background-color: blue;">Blue</button>
        <button id="orange" style="height: 100px; width: 100px; background-color: orange;">Orange</button>
        <button id="green" style="height: 100px; width: 100px; background-color: green;">Green</button>
        <button id="pink" style="height: 100px; width: 100px; background-color: pink;">Pink</button>
    </div>

     <script src="./first.js"></script>
</body>
</html>
